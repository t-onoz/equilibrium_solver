activity_model:
  # available values:
  #   none, debye_huckel, ex_debye_huckel, davies, truesdell_jones
  # for ex_debye_huckel, "a" value (in nm) for each species is required
  # for truesdell_jones, "a" (in nm) and "b" values for each species is required
  davies
temperature:
  # must be in Kelvin
  298.15
components:
  - name: proton
    base: H+
    constraint: charge
    charge: 1
  - name: carbonate
    base: CO2(g)
    constraint: direct
    charge: 0
  - name: calcium
    base: Ca2+
    constraint: total
    charge: +2
species:
  - name: H+
    phase: liquid
  - name: OH-
    phase: liquid
  - name: CO2(g)
    phase: gas
  - name: CO2aq
    phase: liquid
  - name: HCO3-
    phase: liquid
  - name: CO3^2-
    phase: liquid
  - name: Ca2+
    phase: liquid
  - name: "[CaCO3]aq"
    phase: liquid
  - name: "[CaHCO3]aq"
    phase: liquid
  - name: CaCO3(s)
    phase: solid
  - name: "[CaOH]+aq"
    phase: liquid
  - name: Ca(OH)2(s)
    phase: solid
equilibria:
  - name: water autoionization
    logK: -14.00
    DH: 55.8
    composition:
      H+: 1
      OH-: 1
  - name: CO2 dissolution
    logK: -1.47
    DH: -19.7
    composition:
      CO2aq: 1
      CO2(g): -1
  - name: CO2 deprotonation 1
    logK: -6.3
    DH: 9.2
    composition:
      CO2aq: -1
      H+: 1
      HCO3-: 1
  - name: CO2 deprotonation 2
    logK: -10.33
    DH: 14.6
    composition:
      H+: 1
      CO3^2-: 1
      HCO3-: -1
  - name: calcium complex 1
    logK: 3.20
    DH: 16.7
    composition:
      "[CaCO3]aq": 1
      Ca2+: -1
      CO3^2-: -1
  - name: calcium complex 2
    logK: 1.27
    DH: 20.9
    composition:
      "[CaHCO3]aq": 1
      Ca2+: -1
      HCO3-: -1
  - name: CaCO3(s) precipitation
    logK: -8.48
    DH: -8.4
    composition:
      Ca2+: 1
      CO3^2-: 1
      CaCO3(s): -1
  - name: CaOH complex formation
    logK: 1.30
    DH: 8.4
    composition:
      Ca2+: -1
      OH-: -1
      "[CaOH]+aq": 1
  - name: Ca(OH)2 precipitation
    logK: -5.19
    DH: -18.0
    composition:
      Ca2+: 1
      OH-: 2
      Ca(OH)2(s): -1
